version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3
  environment: &airflow-env
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: wKWrZIvJ5L_t3nqF9mD2p_vC8xQ5kL9m_vJ2nP7sR3=
    AIRFLOW_HOME: /opt/airflow
    DBT_PROJECT_DIR: /opt/airflow/course-data-pipeline/dbt_project
    DBT_PROFILES_DIR: /opt/airflow/course-data-pipeline/dbt_project
  volumes: &airflow-volumes
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./output:/opt/airflow/output
    - ./logs:/opt/airflow/logs
    - ./course-data-pipeline:/opt/airflow/course-data-pipeline
    - ./udemy_scraper:/opt/airflow/udemy_scraper
    - ./udacity_scraper:/opt/airflow/udacity_scraper
    - ./coursera_scraper:/opt/airflow/coursera_scraper

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # This service runs once: installs dbt, initializes the DB, creates admin user.
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install dbt-core dbt-duckdb curl_cffi pandas tqdm --quiet 2>&1 | tail -5
        airflow db init
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com || true
        echo "✅ Airflow init complete"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    command: >
      bash -c "
      pip install dbt-core dbt-duckdb curl_cffi pandas tqdm --quiet &&
      airflow webserver -p 8080
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: >
      bash -c "
      pip install dbt-core dbt-duckdb curl_cffi pandas tqdm --quiet &&
      airflow scheduler
      "

volumes:
  postgres_data:
